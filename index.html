<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joshua | About Me</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
    transition: background 0.4s;
}

body.animated {
    background: linear-gradient(270deg, #0a0f2c, #0d47a1, #1565c0);
    background-size: 600% 600%;
    animation: gradientMove 12s ease infinite;
}

body.plain {
    background: #0d47a1;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    padding: 60px 20px;
}

.profile {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid #42a5f5;
    object-fit: cover;
    margin-bottom: 15px;
    transition: 0.3s;
}

.profile:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #42a5f5;
}

h1 {
    font-size: 38px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 18px;
    opacity: 0.8;
    margin-bottom: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 20px;
    margin: 20px auto;
    max-width: 520px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 0 20px rgba(66,165,245,0.3);
}

a.button {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 22px;
    border-radius: 25px;
    background: #1e88e5;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

a.button:hover {
    background: #42a5f5;
}

.toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    padding: 10px 15px;
    border-radius: 20px;
    background: #1e88e5;
    cursor: pointer;
    font-size: 14px;
}

.toggle:hover {
    background: #42a5f5;
}

.cursor {
    position: fixed;
    width: 15px;
    height: 15px;
    background: #42a5f5;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.6;
    transform: translate(-50%, -50%);
    filter: blur(6px);
}

.hidden {
    opacity: 0;
}
</style>
</head>

<body class="animated">

<div class="cursor" id="cursor"></div>

<div class="toggle" id="toggleBtn">Disable Animations</div>

<div class="container">

<img class="profile" src="https://cdn.discordapp.com/attachments/1465411636385939581/1484206907307856063/Screenshot_2026-02-12_213303.png?ex=69bd62e5&is=69bc1165&hm=238a673a98e94ec98b1d1576d7c4c5ee98ebd344fa9dd906a428c8965f2d288d">

<h1 id="title"></h1>
<div class="subtitle" id="subtitle"></div>

<div class="card hidden" id="card1">
<h2>Discord Info</h2>
<p><strong>Username:</strong> joshua_neww</p>
<p><strong>User ID:</strong> 1465833498949455873</p>
<p><strong>Joined:</strong> January 27, 2026</p>
</div>

<div class="card hidden" id="card2">
<h2>Server Roles</h2>
<p>Moderator at ZapBot</p>
<a class="button" href="https://discord.gg/freefollow" target="_blank">Join Server</a>
</div>

<div class="card hidden" id="card3">
<h2>About Me</h2>
<p id="aboutText"></p>
</div>

</div>

<script>
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

const toggleBtn = document.getElementById("toggleBtn");
const body = document.body;

toggleBtn.onclick = () => {
    if (body.classList.contains("animated")) {
        body.classList.remove("animated");
        body.classList.add("plain");
        toggleBtn.textContent = "Enable Animations";
        cursor.style.display = "none";
    } else {
        body.classList.remove("plain");
        body.classList.add("animated");
        toggleBtn.textContent = "Disable Animations";
        cursor.style.display = "block";
    }
};

function typeText(element, text, speed, callback) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else if (callback) {
            callback();
        }
    }
    typing();
}

const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const aboutText = document.getElementById("aboutText");

typeText(title, "Hey, I'm Joshua", 20, () => {
    typeText(subtitle, "Roblox Developer • Discord Bot Developer", 15, () => {
        document.getElementById("card1").classList.remove("hidden");
        setTimeout(() => {
            document.getElementById("card2").classList.remove("hidden");
        }, 150);
        setTimeout(() => {
            document.getElementById("card3").classList.remove("hidden");
            typeText(aboutText,
                "Hey, I am Joshua. Thank you for visiting my page! If you need to get into contact with me, feel free to DM me on Discord, and I will try to get back to you. I also make Roblox games and Discord bots, and I do a bit of Lua and Python while continuing to learn more.",
            10);
        }, 300);
    });
});
</script>

</body>
</html>
